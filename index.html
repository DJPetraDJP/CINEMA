<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1">
    <title>Open Air Cinema</title>
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background: #000; 
            touch-action: none; 
        }
        #title, #movie-title {
            position: absolute; 
            left: 50%; 
            transform: translateX(-50%);
            color: #ffffff; 
            font-family: Arial, Helvetica, sans-serif;
            font-weight: bold; 
            text-shadow: 0 0 20px rgba(0,0,0,0.95), 0 2px 4px rgba(0,0,0,0.8);
            pointer-events: none; 
            z-index: 100;
            -webkit-text-stroke: 1.5px rgba(0,0,0,0.6); /* schärfere Buchstaben */
            white-space: nowrap;
        }
        #title {
            top: 20px;
            font-size: 8.2vw;
            letter-spacing: 4px;
        }
        #movie-title {
            top: 95px;           /* direkt unter "OPEN AIR CINEMA" */
            font-size: 5.2vw;
            letter-spacing: 2.5px;
        }
        #controls {
            position: absolute; 
            bottom: 20px; 
            left: 20px; 
            z-index: 100;
            display: grid; 
            grid-template-columns: 60px 60px 60px; 
            gap: 8px;
        }
        .btn {
            width: 60px; 
            height: 60px; 
            background: rgba(255,255,255,0.25);
            color: white; 
            border: 2px solid rgba(255,255,255,0.6);
            border-radius: 12px; 
            font-size: 32px; 
            display: flex;
            align-items: center; 
            justify-content: center;
        }
        canvas { 
            display: block; 
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
</head>
<body>
    <div id="title">OPEN AIR CINEMA</div>
    <div id="movie-title">MOVIE TITLE</div>

    <div id="controls">
        <div></div><div class="btn" id="up">↑</div><div></div>
        <div class="btn" id="left">←</div>
        <div class="btn" id="down">↓</div>
        <div class="btn" id="right">→</div>
    </div>

    <script>
    const videoURL = "grok_video_2026-05-15-23-40-22.mp4.mp4";

        const scene = new THREE.Scene();
        scene.fog = new THREE.Fog(0x88aaff, 40, 150);

        const camera = new THREE.PerspectiveCamera(62, window.innerWidth / window.innerHeight, 0.1, 200);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        scene.background = new THREE.Color(0x88aaff);

        const sun = new THREE.DirectionalLight(0xffeecc, 1.2);
        sun.position.set(25, 60, 30);
        scene.add(sun);
        scene.add(new THREE.AmbientLight(0xaaccff, 0.7));

        // Sand
        const sand = new THREE.Mesh(new THREE.PlaneGeometry(150, 150), new THREE.MeshLambertMaterial({ color: 0xe0c090 }));
        sand.rotation.x = -Math.PI / 2;
        scene.add(sand);

        // Ocean, Trees, Sofas, Screen (unverändert)
        const ocean = new THREE.Mesh(new THREE.PlaneGeometry(80, 60), new THREE.MeshLambertMaterial({ color: 0x0088dd, transparent: true, opacity: 0.85 }));
        ocean.rotation.x = -Math.PI / 2;
        ocean.position.set(-35, 0.2, -10);
        scene.add(ocean);

        function createPinkTree(x, z) {
            const group = new THREE.Group();
            const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.8, 1.2, 7, 8), new THREE.MeshLambertMaterial({ color: 0x8B5A2B }));
            trunk.position.y = 3.5;
            const foliage = new THREE.Mesh(new THREE.SphereGeometry(4.5, 10, 10), new THREE.MeshLambertMaterial({ color: 0xff69b4 }));
            foliage.position.y = 9;
            group.add(trunk); group.add(foliage);
            group.position.set(x, 0, z);
            scene.add(group);
        }
        createPinkTree(-18, -15); createPinkTree(22, -18); createPinkTree(-25, 5);

        function createSofa(x, z) {
            const sofa = new THREE.Group();
            const base = new THREE.Mesh(new THREE.BoxGeometry(4.8, 0.8, 2.2), new THREE.MeshLambertMaterial({ color: 0xff69b4 }));
            base.position.y = 0.9; sofa.add(base);
            const back = new THREE.Mesh(new THREE.BoxGeometry(4.8, 1.8, 0.5), new THREE.MeshLambertMaterial({ color: 0xff4d94 }));
            back.position.set(0, 1.8, -0.8); sofa.add(back);
            sofa.rotation.y = Math.PI;
            sofa.position.set(x, 0, z);
            scene.add(sofa);
        }
        createSofa(-10, 12); createSofa(10, 13); createSofa(-12, 20); createSofa(12, 21); createSofa(0, 17);

        const screen = new THREE.Mesh(new THREE.PlaneGeometry(24, 13.5), new THREE.MeshBasicMaterial({ color: 0x111111, side: THREE.DoubleSide }));
        screen.position.set(0, 8.5, -32);
        scene.add(screen);

        camera.position.set(0, 6, 25);

        // Steuerung & Video (unverändert)
        let yaw = 0, isDragging = false, prevX = 0;
        renderer.domElement.addEventListener('touchstart', e => { if (e.touches.length === 1) { isDragging = true; prevX = e.touches[0].clientX; }});
        renderer.domElement.addEventListener('touchmove', e => {
            if (isDragging) {
                yaw -= (e.touches[0].clientX - prevX) * 0.0038;
                camera.rotation.set(0, yaw, 0);
                prevX = e.touches[0].clientX;
            }
        });
        renderer.domElement.addEventListener('touchend', () => isDragging = false);

        let moveF = false, moveB = false, moveL = false, moveR = false;
        const speed = 0.24;

        function btn(id, dir) {
            document.getElementById(id).addEventListener('touchstart', e => { e.preventDefault(); dir(true); });
            document.getElementById(id).addEventListener('touchend', e => { e.preventDefault(); dir(false); });
        }
        btn('up', v => moveF = v);
        btn('down', v => moveB = v);
        btn('left', v => moveL = v);
        btn('right', v => moveR = v);

        let playing = false;
        const video = document.createElement('video');
        video.style.display = 'none';
        document.body.appendChild(video);

        const movieTitleDiv = document.getElementById('movie-title');

        renderer.domElement.addEventListener('click', e => {
            const ray = new THREE.Raycaster();
            ray.setFromCamera(new THREE.Vector2((e.clientX / window.innerWidth)*2-1, -(e.clientY / window.innerHeight)*2+1), camera);
            if (ray.intersectObject(screen).length > 0) {
                if (!playing) {
                    video.src = videoURL;
                    video.loop = true;
                    video.onloadedmetadata = () => {
                        const vAspect = video.videoWidth / video.videoHeight;
                        const sAspect = 24 / 13.5;
                        let sx = 1, sy = 1;
                        if (vAspect > sAspect) sy = sAspect / vAspect;
                        else sx = vAspect / sAspect;
                        const tex = new THREE.VideoTexture(video);
                        tex.repeat.set(sx, sy);
                        tex.offset.set((1-sx)/2, (1-sy)/2);
                        screen.material.map = tex;
                        screen.material.needsUpdate = true;
                    };
                    video.play().then(() => { playing = true; movieTitleDiv.style.display = 'none'; });
                } else {
                    video.pause();
                    screen.material.map = null;
                    playing = false;
                    movieTitleDiv.style.display = 'block';
                }
            }
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        function animate() {
            requestAnimationFrame(animate);
            const dir = new THREE.Vector3();
            if (moveF) dir.z -= 1;
            if (moveB) dir.z += 1;
            if (moveL) dir.x -= 1;
            if (moveR) dir.x += 1;
            if (dir.length() > 0) {
                dir.normalize().applyQuaternion(camera.quaternion);
                dir.y = 0;
                camera.position.addScaledVector(dir, speed);
                camera.position.x = Math.max(-40, Math.min(40, camera.position.x));
                camera.position.z = Math.max(-5, Math.min(35, camera.position.z));
            }
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
